name: Windows

on:
  push:
    branches: ["*"]
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

concurrency:
  group: windows-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-test:
    runs-on: windows-2025
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x
      - name: Restore
        run: dotnet restore src/windows/CodexBar.Windows.sln
      - name: Test
        run: dotnet test src/windows/CodexBar.Windows.sln --configuration Release --verbosity minimal

  package:
    runs-on: windows-2025
    timeout-minutes: 30
    needs: build-test
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
      id-token: write  # required for OIDC federation to Microsoft Entra
    env:
      TRUSTED_SIGNING_ENDPOINT: ${{ vars.TRUSTED_SIGNING_ENDPOINT }}
      TRUSTED_SIGNING_ACCOUNT_NAME: ${{ vars.TRUSTED_SIGNING_ACCOUNT_NAME }}
      TRUSTED_SIGNING_PROFILE_NAME: ${{ vars.TRUSTED_SIGNING_PROFILE_NAME }}
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x
      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Sync version.env to git tag
        shell: pwsh
        run: |
          # The tag drives the release name and channel. Bake its preview number and
          # channel into version.env so the binary reports the correct version to the
          # in-app update checker. Without this the checker compares the previous-build
          # preview number against the freshly-tagged one and reports "update available"
          # right after installing the just-published release.
          #
          # Two tag shapes are supported:
          #   vX.Y.Z-preview.N -> WINDOWS_PREVIEW_NUMBER=N, CHANNEL=preview
          #   vX.Y.Z           -> CHANNEL=stable (WINDOWS_PREVIEW_NUMBER unused for stable)
          $tag = "${{ github.ref_name }}"
          $previewNumber = $null
          $channel = $null
          if ($tag -match '^v\d+\.\d+\.\d+-preview\.(?<num>\d+)$') {
              $previewNumber = $matches['num']
              $channel = 'preview'
              Write-Host "Preview tag $tag -> WINDOWS_PREVIEW_NUMBER=$previewNumber, CHANNEL=preview"
          } elseif ($tag -match '^v\d+\.\d+\.\d+$') {
              $channel = 'stable'
              Write-Host "Stable tag $tag -> CHANNEL=stable (WINDOWS_PREVIEW_NUMBER left unchanged)"
          } else {
              Write-Host "::notice::Tag $tag does not look like a release tag; leaving version.env untouched."
          }

          if ($null -ne $channel) {
              $envFile = Join-Path $env:GITHUB_WORKSPACE 'version.env'
              $lines = Get-Content -LiteralPath $envFile
              $updated = @()
              $previewFound = $false
              $channelFound = $false
              foreach ($line in $lines) {
                  if ($null -ne $previewNumber -and $line -match '^WINDOWS_PREVIEW_NUMBER=') {
                      $updated += "WINDOWS_PREVIEW_NUMBER=$previewNumber"
                      $previewFound = $true
                  } elseif ($line -match '^CHANNEL=') {
                      $updated += "CHANNEL=$channel"
                      $channelFound = $true
                  } else {
                      $updated += $line
                  }
              }
              if ($null -ne $previewNumber -and -not $previewFound) { $updated += "WINDOWS_PREVIEW_NUMBER=$previewNumber" }
              if (-not $channelFound) { $updated += "CHANNEL=$channel" }
              Set-Content -LiteralPath $envFile -Value $updated -Encoding ascii
          }

      - name: Check Trusted Signing availability
        id: signing-availability
        shell: pwsh
        run: |
          # All six variables must be present. Setting only the TRUSTED_SIGNING_* trio
          # without the AZURE_* trio used to silently fail later in azure/login —
          # gate the whole signing path on having every input we need.
          $configured = (-not [string]::IsNullOrWhiteSpace($env:TRUSTED_SIGNING_ENDPOINT)) -and `
                        (-not [string]::IsNullOrWhiteSpace($env:TRUSTED_SIGNING_ACCOUNT_NAME)) -and `
                        (-not [string]::IsNullOrWhiteSpace($env:TRUSTED_SIGNING_PROFILE_NAME)) -and `
                        (-not [string]::IsNullOrWhiteSpace($env:AZURE_CLIENT_ID)) -and `
                        (-not [string]::IsNullOrWhiteSpace($env:AZURE_TENANT_ID)) -and `
                        (-not [string]::IsNullOrWhiteSpace($env:AZURE_SUBSCRIPTION_ID))
          "configured=$($configured.ToString().ToLower())" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          if (-not $configured) {
              Write-Host "::notice::Trusted Signing variables not set; publishing unsigned assets."
          } else {
              Write-Host "Trusted Signing configured. Signing CodexBar.WinUI.exe and installer."
              "PUBLISH_DIR_NAME=" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      - name: Publish self-contained app (unsigned)
        shell: pwsh
        run: |
          ./Scripts/package-windows.ps1 -DotNet dotnet -PublishOnly | Out-Null
          # Locate the publish directory so subsequent steps can target it. The script
          # writes it to dist/windows/CodexBar-Windows-<version>-<runtime>.
          $publishDir = (Get-ChildItem -Directory dist/windows | Where-Object { $_.Name -like 'CodexBar-Windows-*' } | Select-Object -First 1).FullName
          if ($null -eq $publishDir) { throw "Publish directory not found under dist/windows." }
          "PUBLISH_DIR=$publishDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Azure login (OIDC)
        if: steps.signing-availability.outputs.configured == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Sign CodexBar.WinUI.exe via Trusted Signing
        if: steps.signing-availability.outputs.configured == 'true'
        uses: azure/trusted-signing-action@v0.5.1
        with:
          endpoint: ${{ env.TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ env.TRUSTED_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ env.TRUSTED_SIGNING_PROFILE_NAME }}
          files-folder: ${{ env.PUBLISH_DIR }}
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Build portable zip from signed publish dir
        shell: pwsh
        run: |
          # -SkipPublish reuses the publish directory we just signed; -SkipSigning
          # because the exe is already signed by Trusted Signing above (or intentionally
          # unsigned when Trusted Signing isn't configured).
          ./Scripts/package-windows.ps1 -DotNet dotnet -SkipPublish -SkipSigning

      - name: Build installer from signed publish dir
        shell: pwsh
        run: |
          # -SkipPortablePackage because the zip is already built; -SkipSigning because
          # the embedded exe is already signed and the outer installer.exe gets signed
          # by the next Trusted Signing step.
          ./Scripts/package-windows-installer.ps1 -DotNet dotnet -SkipPortablePackage -SkipSigning

      - name: Sign installer via Trusted Signing
        if: steps.signing-availability.outputs.configured == 'true'
        uses: azure/trusted-signing-action@v0.5.1
        with:
          endpoint: ${{ env.TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ env.TRUSTED_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ env.TRUSTED_SIGNING_PROFILE_NAME }}
          files-folder: dist/windows
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Refresh installer checksum
        if: steps.signing-availability.outputs.configured == 'true'
        shell: pwsh
        run: |
          $installer = Get-ChildItem dist/windows/*.installer.exe | Select-Object -First 1
          $hash = Get-FileHash -Algorithm SHA256 -LiteralPath $installer.FullName
          "$($hash.Hash.ToLowerInvariant())  $(Split-Path -Leaf $installer.FullName)" | Set-Content -LiteralPath "$($installer.FullName).sha256" -Encoding ascii

      - name: Upload portable artifact
        uses: actions/upload-artifact@v5
        with:
          name: CodexBar-Windows-portable
          path: |
            dist/windows/*.zip
            dist/windows/*.zip.sha256
            dist/windows/*.installer.exe
            dist/windows/*.installer.exe.sha256
      - name: Publish prerelease assets
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/windows/*.zip
            dist/windows/*.zip.sha256
            dist/windows/*.installer.exe
            dist/windows/*.installer.exe.sha256
