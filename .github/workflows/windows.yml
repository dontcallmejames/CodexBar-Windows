name: Windows

on:
  push:
    branches: ["*"]
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

concurrency:
  group: windows-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-test:
    runs-on: windows-2025
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x
      - name: Restore
        run: dotnet restore src/windows/CodexBar.Windows.sln
      - name: Test
        run: dotnet test src/windows/CodexBar.Windows.sln --configuration Release --verbosity minimal

  package:
    runs-on: windows-2025
    timeout-minutes: 30
    needs: build-test
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x
      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y
      - name: Package
        shell: pwsh
        run: ./Scripts/package-windows.ps1 -DotNet dotnet
      - name: Package installer
        shell: pwsh
        run: ./Scripts/package-windows-installer.ps1 -DotNet dotnet -SkipPortablePackage
      - name: Upload portable artifact
        uses: actions/upload-artifact@v5
        with:
          name: CodexBar-Windows-portable
          path: |
            dist/windows/*.zip
            dist/windows/*.zip.sha256
            dist/windows/*.installer.exe
            dist/windows/*.installer.exe.sha256
      - name: Publish prerelease assets
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/windows/*.zip
            dist/windows/*.zip.sha256
            dist/windows/*.installer.exe
            dist/windows/*.installer.exe.sha256
